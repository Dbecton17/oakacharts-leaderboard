
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Basic+Sans&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0 12px 12px 12px;
      font-family: 'Basic Sans', Arial, sans-serif;
      background-color: transparent;
      color: #ffffff;
      overflow-x: hidden;
    }

    .preview-title {
      font-family: 'Basic Sans', Arial, sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      font-size: clamp(16px, 3.5vw, 24px);
      letter-spacing: 2px;
      line-height: 1.1;
      text-align: center;
      margin: 16px 0 12px 0;
      color: #ffffff;
      text-shadow:
        0 0 8px #A11616,
        0 0 18px #A11616,
        0 0 32px #A11616;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: hidden;
      overflow-y: visible;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(13px, 2.5vw, 16px);
      table-layout: fixed;
    }

    th {
      color: #A11616;
      font-size: clamp(12px, 2vw, 15px);
      text-align: left;
      padding: 8px 8px 8px 0;
      border-bottom: 2px solid #A11616;
      white-space: nowrap;
    }

    td {
      padding: 10px 8px 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      line-height: 1.4;
      vertical-align: middle;
      word-break: break-word;
      white-space: normal;
      overflow: hidden;
    }

    col.col-rank  { width: 10%; }
    col.col-artist { width: 35%; }
    col.col-song  { width: 55%; }

    .rank-number {
      font-weight: bold;
      font-family: 'Impact', 'Arial Black', sans-serif;
      color: #FF3B3F;
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000,
         2px  2px 5px #FFD700;
      letter-spacing: 1px;
      font-size: clamp(14px, 3vw, 18px);
      white-space: nowrap;
    }

    .first-place td {
      background-color: #FFD700;
      color: #000;
      font-weight: bold;
    }
    .first-place .rank-number {
      color: #A11616;
      text-shadow: none;
    }
    .first-place a { color: #000; }

    a { color: #FFFFFF; text-decoration: underline; }

    .view-all-wrap {
      text-align: center;
      margin-top: 14px;
    }

    .view-all-btn {
      display: inline-block;
      background-color: #A11616;
      color: #ffffff;
      font-family: 'Basic Sans', Arial, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: clamp(11px, 2vw, 13px);
      padding: 8px 20px;
      border-radius: 4px;
      text-decoration: none;
    }

    .view-all-btn:hover {
      background-color: #cc1c1c;
    }
  </style>
</head>
<body>

  <p class="preview-title">Top 5 This Week</p>

  <div class="table-wrapper">
    <table>
      <colgroup>
        <col class="col-rank">
        <col class="col-artist">
        <col class="col-song">
      </colgroup>
      <thead>
        <tr>
          <th>#</th>
          <th>Artist</th>
          <th>Song Title</th>
        </tr>
      </thead>
      <tbody>
  
      <tr class="first-place">
        <td class="rank-number">1</td>
        <td>Pwap</td>
        <td><a href="https://youtu.be/N9SxA5kbkME?si=JCzSf7Ue7wSYn0xJ" target="_blank">I Ain't Scared</a></td>
      </tr>
    
      <tr class="">
        <td class="rank-number">2</td>
        <td>Bankroll Jugg, Creep Gambino</td>
        <td><a href="https://youtu.be/REpq35PpMR4?si=VDq6SVxRj4Fuff1A" target="_blank">Safe</a></td>
      </tr>
    
      <tr class="">
        <td class="rank-number">3</td>
        <td>51 June</td>
        <td><a href="https://www.youtube.com/watch?v=zkO_VqIrgUw" target="_blank">Overly Sure</a></td>
      </tr>
    
      <tr class="">
        <td class="rank-number">4</td>
        <td>Ten SG</td>
        <td><a href="https://www.youtube.com/watch?v=vGMsnGRFXFo&list=RDvGMsnGRFXFo&start_radio=1" target="_blank">Time 4 A Change</a></td>
      </tr>
    
      <tr class="">
        <td class="rank-number">5</td>
        <td>Ohni G</td>
        <td><a href="https://youtu.be/HwlKUkjxxPE?si=0xnxQLCZoL-QQa24" target="_blank">Benji</a></td>
      </tr>
    
      </tbody>
    </table>
  </div>

  <div class="view-all-wrap">
    <a class="view-all-btn" href="https://www.theoaka.com/heatcheck-top-20" target="_blank">
      View Full Top 20
    </a>
  </div>

  <script>
    function sendHeight() {
      window.parent.postMessage({ frameHeight: document.body.scrollHeight + 10 }, '*');
    }
    window.addEventListener('load', sendHeight);
    window.addEventListener('resize', sendHeight);
    window.addEventListener('message', function(e) {
      if (e.data === 'getHeight') sendHeight();
    });
  </script>

</body>
</html>
